function b64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function decrypt() {
  const pw = document.getElementById("pw").value;
  if (!pw) return;
  document.getElementById("err").style.display = "none";
  document.getElementById("spin").style.display = "block";
  try {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name:"PBKDF2", salt:b64(SALT), iterations:310000, hash:"SHA-256" },
      keyMat, { name:"AES-GCM", length:256 }, false, ["decrypt"]
    );
    const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64(IV) }, key, b64(CT));
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById("spin").style.display = "none";
    document.getElementById("err").style.display = "block";
  }
}
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") decrypt(); });
