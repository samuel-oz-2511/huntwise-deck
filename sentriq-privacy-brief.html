  .err{font-size:12px;color:#FCA5A5;margin-top:10px;display:none;}
  .spin{display:none;font-size:12px;color:rgba(255,255,255,0.4);margin-top:10px;}
  .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#2563EB;margin-bottom:10px;}

function b64(s){
  return Uint8Array.from(atob(s), c => c.charCodeAt(0));
}

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('spin').style.display = 'block';

  try {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey(
      'raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(SALT), iterations:310000, hash:'SHA-256' },
      keyMat,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );
    const plain = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv:b64(IV) },
      key,
      b64(CT)
    );
    const html = new TextDecoder().decode(plain);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') decrypt();
});
</script>
